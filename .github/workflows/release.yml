name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare asset
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p lumen-${{ matrix.target }}
          cp lumen${{ matrix.ext }} lumen-${{ matrix.target }}/
          cp ../../../README.md lumen-${{ matrix.target }}/
          cp ../../../LICENSE* lumen-${{ matrix.target }}/ 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a -tzip ../../../lumen-${{ matrix.target }}.zip lumen-${{ matrix.target }}/
          else
            tar czf ../../../lumen-${{ matrix.target }}.tar.gz lumen-${{ matrix.target }}/
          fi
      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: lumen-${{ matrix.target }}
          path: lumen-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LÚMEN v${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: artifacts/**/*
